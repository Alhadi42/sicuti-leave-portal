<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background circle (maskable safe area) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Calendar icon -->
  <rect x="112" y="160" width="288" height="248" rx="20" fill="none" stroke="url(#icon)" stroke-width="20"/>
  <!-- Calendar top bar -->
  <rect x="112" y="160" width="288" height="72" rx="20" fill="url(#icon)"/>
  <!-- Calendar hooks -->
  <line x1="176" y1="128" x2="176" y2="192" stroke="url(#icon)" stroke-width="20" stroke-linecap="round"/>
  <line x1="336" y1="128" x2="336" y2="192" stroke="url(#icon)" stroke-width="20" stroke-linecap="round"/>
  <!-- Checkmark inside -->
  <path d="M176 288 L224 336 L336 224" fill="none" stroke="url(#icon)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
